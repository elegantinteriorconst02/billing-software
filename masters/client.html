<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Client Master</title>

<link rel="stylesheet" href="../assets/menu.css">

<style>
body{
  margin:0;
  font-family:sans-serif;
  background:#f4f7f6;
}

.main{
  padding:20px;
  max-width:1100px;
}

h2{
  border-bottom:2px solid #4a90e2;
  padding-bottom:10px;
  margin-top:0;
}

.container{
  display:grid;
  grid-template-columns:350px 1fr;
  gap:30px;
}

.card{
  background:#fff;
  padding:20px;
  border-radius:8px;
  box-shadow:0 2px 5px rgba(0,0,0,0.1);
}

input, textarea{
  width:100%;
  padding:8px;
  border:1px solid #ccc;
  border-radius:4px;
}

textarea{ height:60px }

.btn-group{
  display:flex;
  gap:10px;
  margin-top:15px;
}

button{
  cursor:pointer;
  padding:10px;
  border:none;
  border-radius:4px;
  font-weight:bold;
}

.btn-save{ background:#28a745; color:#fff; flex:2; }
.btn-reset{ background:#6c757d; color:#fff; flex:1; }

table{
  width:100%;
  border-collapse:collapse;
  background:#fff;
}

th, td{
  padding:12px;
  border-bottom:1px solid #eee;
}

th{
  background:#4a90e2;
  color:#fff;
}

.btn-delete{ background:#dc3545; color:#fff; }

#clientSearch{
  width:100%;
  padding:8px;
  margin:15px 0;
}
</style>
</head>

<body>

<div id="menuContainer"></div>

<div class="main">

<h2>Client Master</h2>

<input id="clientSearch" placeholder="Search...">

<div class="container">

<div class="card">
<form id="clientForm">

<input type="hidden" id="clientId">

<input id="name" placeholder="Client Name *" required>
<input id="mobile" placeholder="Mobile">
<input id="email" placeholder="Email">
<input id="gst" placeholder="GST">
<input id="state" placeholder="State">
<input id="pin" placeholder="PIN">

<textarea id="address" placeholder="Address"></textarea>
<textarea id="notes" placeholder="Notes"></textarea>

<div class="btn-group">
<button type="submit" class="btn-save" id="saveBtn">Save Client</button>
<button type="button" class="btn-reset" onclick="resetForm()">Reset</button>
</div>

</form>
</div>

<div class="card">
<table>
<thead>
<tr>
<th>Name</th>
<th>Mobile</th>
<th>GST</th>
<th>State</th>
<th>Actions</th>
</tr>
</thead>
<tbody id="clientTableBody"></tbody>
</table>
</div>

</div>
</div>

<script type="module">

import { auth } from "../data/firebase.js";
import {
  getClients,
  getClientById,
  saveClient,
  updateClient,
  deleteClient
} from "../data/client.js";

/* WAIT AUTH */
const waitAuth = () => new Promise(resolve=>{
  const t = setInterval(()=>{
    if(auth.currentUser){
      clearInterval(t);
      resolve();
    }
  },100);
});

/* DOM */
const form = document.getElementById("clientForm");
const tableBody = document.getElementById("clientTableBody");
const searchInput = document.getElementById("clientSearch");

const clientId = document.getElementById("clientId");
const name = document.getElementById("name");
const mobile = document.getElementById("mobile");
const email = document.getElementById("email");
const gst = document.getElementById("gst");
const state = document.getElementById("state");
const pin = document.getElementById("pin");
const address = document.getElementById("address");
const notes = document.getElementById("notes");
const saveBtn = document.getElementById("saveBtn");

/* INIT */
window.addEventListener("DOMContentLoaded", async ()=>{
  await waitAuth();
  await refreshList();
});

/* SAVE */
form.addEventListener("submit", async (e)=>{
  e.preventDefault();

  if(!auth.currentUser){
    alert("Login not ready");
    return;
  }

  saveBtn.textContent = "Saving...";
  saveBtn.disabled = true;

  const data = {
    id: clientId.value,
    name: name.value,
    mobile: mobile.value,
    email: email.value,
    gst: gst.value,
    state: state.value,
    pin: pin.value,
    address: address.value,
    notes: notes.value
  };

  try{
    if(data.id){
      await updateClient(data);
    }else{
      await saveClient(data);
    }

    resetForm();
    await refreshList();

  }catch(err){
    alert(err.message);
  }

  saveBtn.textContent = "Save Client";
  saveBtn.disabled = false;
});

/* LOAD LIST */
async function refreshList(){

  tableBody.innerHTML = "<tr><td colspan='5'>Loading...</td></tr>";

  const q = (searchInput.value || "").toLowerCase();

  const clients = await getClients();

  tableBody.innerHTML = "";

  clients
    .filter(c =>
      c.name?.toLowerCase().includes(q) ||
      c.mobile?.includes(q)
    )
    .forEach(c=>{
      tableBody.innerHTML += `
        <tr>
          <td><b>${c.name}</b></td>
          <td>${c.mobile||""}</td>
          <td>${c.gst||"-"}</td>
          <td>${c.state||""}</td>
          <td>
            <button onclick="window.editEntry('${c.id}')">Edit</button>
            <button class="btn-delete" onclick="window.deleteEntry('${c.id}')">Delete</button>
          </td>
        </tr>
      `;
    });
}

/* SEARCH */
searchInput.addEventListener("input", refreshList);

/* EDIT */
window.editEntry = async function(id){
  const c = await getClientById(id);
  if(!c) return;

  clientId.value = c.id;
  name.value = c.name;
  mobile.value = c.mobile;
  email.value = c.email;
  gst.value = c.gst;
  state.value = c.state;
  pin.value = c.pin;
  address.value = c.address;
  notes.value = c.notes;
};

/* DELETE */
window.deleteEntry = async function(id){
  if(confirm("Delete this client?")){
    await deleteClient(id); // 🔥 already recycle enabled
    await refreshList();
  }
};

/* RESET */
window.resetForm = function(){
  form.reset();
  clientId.value = "";
};

/* MENU LOAD */
fetch("../shared/menu.html")
  .then(r=>r.text())
  .then(html=>{
    document.getElementById("menuContainer").innerHTML = html;
    initMenu();
  });

</script>

<script src="../shared/menu.js"></script>

</body>
</html>
